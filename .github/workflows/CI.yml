name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      # Pure static analysis over the Python sources -- unlike basedpyright
      # (which needs to import the compiled extension module to type-check
      # against it), ruff never executes or imports anything, so no Rust
      # toolchain or `maturin develop` build step is needed here at all.
      - name: Run ruff check
        run: uv run ruff check .
      - name: Run ruff format --check
        run: uv run ruff format --check .

  basedpyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - name: Build the extension module
        run: uv run maturin develop --uv
      - name: Run basedpyright
        run: uv run basedpyright . --warnings

  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
            manylinux: auto
            args: --release --out dist --find-interpreter --auditwheel=warn
          - runner: ubuntu-22.04
            target: x86
            manylinux: auto
            args: --release --out dist --find-interpreter --auditwheel=warn
          # s390x/ppc64le/armv7: manylinux2014-cross's bundled cross-gcc is too
          # old to ship stdatomic.h, which CPython 3.13+'s mimalloc allocator
          # requires -- manylinux_2_28-cross bundles a newer one that has it
          # (verified against ghcr.io/rust-cross/manylinux_2_28-cross's actual
          # published tags -- it covers armv7 even though PyPA doesn't publish
          # a *native* manylinux_2_28_armv7l image). aarch64 used to be built
          # here too via manylinux_2_28-cross, but ubuntu-24.04-arm (a genuine
          # ARM64 GitHub-hosted runner) lets it build and test natively
          # instead -- no cross-gcc, no QEMU -- see the linux-aarch64 job
          # below.
          #
          # maturin's --find-interpreter doesn't actually scan these *-cross
          # images' filesystem for what interpreters are really present -- it
          # optimistically assumes a fixed set of "commonly available" tags
          # for the target triple and tries all of them regardless, so it
          # always attempts (and fails) a build for whichever aren't really
          # there instead of skipping them. What's empirically confirmed
          # present (by which CPython/CPython+free-threaded/PyPy builds
          # actually succeeded here) varies per architecture -- PyPy isn't
          # published upstream at all for these three, and free-threaded 3.14
          # is missing for s390x/armv7 too -- so each needs its own explicit
          # -i list of proven-working interpreters instead of
          # --find-interpreter's unverified guess.
          - runner: ubuntu-22.04
            target: s390x
            manylinux: "2_28"
            args: --release --out dist -i python3.10 -i python3.11 -i python3.12 -i python3.13 -i python3.14 --auditwheel=warn
          - runner: ubuntu-22.04
            target: ppc64le
            manylinux: "2_28"
            args: --release --out dist -i python3.10 -i python3.11 -i python3.12 -i python3.13 -i python3.14 -i python3.14t --auditwheel=warn
          - runner: ubuntu-22.04
            target: armv7
            manylinux: "2_28"
            args: --release --out dist -i python3.10 -i python3.11 -i python3.12 -i python3.13 -i python3.14 --auditwheel=warn
          # riscv64 needs glibc new enough to have riscv64 support at all -- PyPA's
          # oldest riscv64 baseline is manylinux_2_39 (verified: no PyPA image
          # exists for any older manylinux_2_* tag).
          #
          # Unlike aarch64/s390x/ppc64le/armv7, `manylinux: "2_39"` alone picked
          # the *native* quay.io/pypa/manylinux_2_39_riscv64 image instead of the
          # *-cross one -- maturin-action's target-to-cross-image auto-mapping
          # apparently doesn't cover riscv64 yet, and running a genuine riscv64
          # container with no QEMU registered in this job fails immediately
          # ("exec format error"). Point at the -cross image explicitly instead.
          #
          # All 6 CPython versions built successfully there -- only PyPy 3.11
          # fails (PyPy doesn't publish riscv64 builds at all, same as
          # s390x/ppc64le/armv7 above), so pin the same kind of explicit -i
          # list rather than --find-interpreter's unverified guess.
          - runner: ubuntu-22.04
            target: riscv64
            manylinux: "2_39"
            container: ghcr.io/rust-cross/manylinux_2_39-cross:riscv64
            args: --release --out dist -i python3.10 -i python3.11 -i python3.12 -i python3.13 -i python3.14 -i python3.14t --auditwheel=warn
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: astral-sh/setup-uv@v7
      # These `manylinux:` values pick maturin-action's fast, natively-running
      # `*-cross` images (e.g. ghcr.io/rust-cross/manylinux_2_28-cross:s390x)
      # for non-x86 targets: a glibc x86_64 host with a cross-gcc bolted on, no
      # QEMU needed at all. build.rs's cross-Python lookup
      # (find_cross_python_executable / resolve_python) derives the target's
      # Python.h/pyconfig.h include dir and EXT_SUFFIX from the manylinux/
      # musllinux /opt/python/<tag>/ directory layout instead of executing the
      # (possibly foreign-architecture, since this image never runs under
      # QEMU) interpreter, so no target Python needs to actually run.
      #
      # --auditwheel=warn everywhere here: `manylinux:` being set at all makes
      # maturin auto-*repair* for compliance by default, which detects
      # _core's dependency on libsqlite3 and copies/renames it into a private
      # sqlite_rs.libs/ directory just for _core's own use -- while
      # sqlite_rs.sqlite3._sqlite3 (a plain C extension build.rs links
      # directly, outside maturin's own crate-tracking) and LIBSQLITE3_PATH
      # still expect the original, pyproject.toml-force-included copy. That
      # leaves two independently-loaded copies of SQLite in one process,
      # which segfaults the moment a raw sqlite3* crosses between them
      # (query_via_rust/get_raw_db_ptr) -- confirmed by CI (linux x86_64
      # passed every test except one, which crashed with "Fatal Python
      # error: Segmentation fault", right after this repair step's own log
      # showed it relocating libsqlite3.so). `--auditwheel=skip` also
      # avoids the repair, but throws out the wheel's manylinux compliance
      # *tag* entirely (falls back to a bare, PyPI/pip-rejected `linux_*`
      # tag) -- confirmed by CI (linux x86 failed to even install its own
      # just-built wheel: "sqlite-rs (v0.1.0) has no wheels with a matching
      # platform tag"). `warn` keeps the real compliance tag while only
      # skipping the problematic repair/relocation step.
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: ${{ matrix.platform.args }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: ${{ matrix.platform.manylinux }}
          container: ${{ matrix.platform.container }}
      # No test steps here: s390x/ppc64le/armv7/riscv64 are built via
      # cross-gcc for a CPU this runner can't execute at all (testing them
      # would need QEMU, the slowness this whole matrix was reworked to
      # avoid), x86 (i686) has no interpreter to install/run it against at
      # all -- unlike windows's actions/setup-python (which supports
      # architecture: x86), Linux runners have no 32-bit Python available
      # (confirmed in CI: "sqlite-rs (v0.1.0) has no wheels with a matching
      # platform tag" against the 64-bit interpreter actions/setup-python
      # actually provisions here) -- and x86_64 is tested in its own
      # dedicated test-linux-x86_64 job below (one job per Python version
      # actually built here, rather than the single "3.x" this job's own
      # setup-python happens to resolve).
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  linux-aarch64:
    # ubuntu-24.04-arm is a genuine ARM64 GitHub-hosted runner (GA and free
    # for public repos), so unlike the linux job's s390x/ppc64le/armv7/
    # riscv64 legs -- which have no native runner option and must cross-
    # compile via manylinux-cross images and skip testing entirely -- aarch64
    # can build against the real, native quay.io/pypa/manylinux_2_28_aarch64
    # image (maturin-action picks it automatically since manylinux: is set
    # and the runner's own arch already matches the target) and then actually
    # install and test the resulting wheel, no QEMU or cross-gcc involved.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: astral-sh/setup-uv@v7
      # --auditwheel=warn: see the matching comment in the linux job -- same
      # risk of maturin's manylinux auto-repair relocating libsqlite3 into a
      # private copy for _core alone, regardless of native vs cross build.
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: --release --out dist --find-interpreter --auditwheel=warn
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: "2_28"
      # Tested in its own dedicated test-linux-aarch64 job below (one job per
      # Python version actually built here), not inline in this job.
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-aarch64
          path: dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
            cross_arch: x86_64
          - runner: ubuntu-22.04
            target: x86
            cross_arch: i686
          - runner: ubuntu-22.04
            target: aarch64
            cross_arch: aarch64
          - runner: ubuntu-22.04
            target: armv7
            cross_arch: armv7
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      # ghcr.io/rust-cross/musllinux_1_2-cross is a fast, natively-running (x86_64
      # host, cross-gcc bolted on, no QEMU) image dedicated to musl wheel building
      # -- distinct from maturin-action's older default `rust-musl-cross` image,
      # which is a general-purpose Rust musl cross-compiling image with no Python
      # at all. This one bundles real target-arch CPython installs under
      # /opt/python, same as the manylinux-cross family; build.rs's cross-Python
      # lookup (find_cross_python_executable / resolve_python) derives the
      # target's Python.h/pyconfig.h include dir and EXT_SUFFIX from that
      # directory layout instead of executing the (possibly foreign-architecture)
      # interpreter, so no target Python needs to actually run.
      #
      # Explicit -i list instead of --find-interpreter: this image's bundled
      # version set tops out at 3.13 (confirmed by the *native*,
      # QEMU-emulated musllinux_1_2 image successfully building 3.10-3.15/
      # 3.14t/3.15t, while this fast -cross image fails past 3.13 on every
      # target) and doesn't have PyPy at all (musl has no PyPy builds
      # upstream, on any architecture) -- but --find-interpreter doesn't
      # actually verify what's present in *-cross images before attempting a
      # build, so it always tries (and fails on) both regardless.
      #
      # --auditwheel=warn: see the matching comment in the linux job -- same
      # risk of maturin relocating libsqlite3 into a private copy for _core
      # alone, leaving the clone module/LIBSQLITE3_PATH pointing at a
      # different, stale one. Not yet confirmed to manifest here (musllinux
      # wheels aren't tested in this job), but the underlying mechanism is
      # identical whenever `manylinux:`/`musllinux_1_2` triggers auto-repair.
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.10 -i python3.11 -i python3.12 -i python3.13 --auditwheel=warn
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
          container: ghcr.io/rust-cross/musllinux_1_2-cross:${{ matrix.platform.cross_arch }}
      # No test step here (unlike the linux job): these wheels are tagged
      # musllinux_1_2_* for musl libc (Alpine) systems, but this runner is a
      # standard glibc Ubuntu host -- pip would refuse to install them at all
      # (incompatible platform tag), regardless of matching CPU architecture.
      # Testing these properly would need a musl/Alpine container step, which
      # is a separate follow-up, not a "native, no extra infra" test.
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-latest
            target: x86
            python_arch: x86
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v6
      # Explicit -i list of exact interpreter paths below, instead of
      # --find-interpreter, because of a real collision hit in CI: once both
      # a regular and a free-threaded build of the same X.Y version were
      # installed (e.g. plain "3.14" and "3.14t"), --find-interpreter only
      # ever found the free-threaded one -- confirmed from build logs, this
      # runner's actions/setup-python evidently registers a free-threaded
      # install in a way that shadows the regular one of the same version,
      # so plain "CPython 3.14"/"3.15" silently vanished from what got
      # built. update-environment: false on every step below keeps each
      # install from touching PATH/registry at all, so only the explicit -i
      # paths (captured via each step's own python-path output) matter --
      # no discovery, no shadowing, no dependence on install order.
      #
      # 3.10 is skipped on windows-11-arm: CPython's official Windows ARM64
      # installers only started at 3.11 (there is no 3.10 arm64 build to
      # install at all), so that one step is allowed to fail there without
      # failing the job.
      - id: py310
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          architecture: ${{ matrix.platform.python_arch }}
          update-environment: false
        continue-on-error: ${{ matrix.platform.target == 'aarch64' }}
      - id: py311
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: ${{ matrix.platform.python_arch }}
          update-environment: false
      - id: py312
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: ${{ matrix.platform.python_arch }}
          update-environment: false
      - id: py313
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          architecture: ${{ matrix.platform.python_arch }}
          update-environment: false
      - id: py314
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          architecture: ${{ matrix.platform.python_arch }}
          update-environment: false
      - id: py315
        uses: actions/setup-python@v6
        with:
          python-version: "3.15"
          architecture: ${{ matrix.platform.python_arch }}
          allow-prereleases: true
          update-environment: false
      - id: py314t
        uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
          architecture: ${{ matrix.platform.python_arch }}
          update-environment: false
      - id: py315t
        uses: actions/setup-python@v6
        with:
          python-version: "3.15t"
          architecture: ${{ matrix.platform.python_arch }}
          allow-prereleases: true
          update-environment: false
      - uses: astral-sh/setup-uv@v7
      # Builds the -i list from each setup-python step's own python-path
      # output, skipping any that didn't run/install (empty output) -- e.g.
      # 3.10 on windows-11-arm above -- rather than passing maturin a
      # literal "-i" with nothing after it.
      - name: Compute interpreter list
        id: interpreters
        shell: bash
        run: |
          args="--release --out dist"
          for p in \
            "${{ steps.py310.outputs.python-path }}" \
            "${{ steps.py311.outputs.python-path }}" \
            "${{ steps.py312.outputs.python-path }}" \
            "${{ steps.py313.outputs.python-path }}" \
            "${{ steps.py314.outputs.python-path }}" \
            "${{ steps.py315.outputs.python-path }}" \
            "${{ steps.py314t.outputs.python-path }}" \
            "${{ steps.py315t.outputs.python-path }}"; do
            if [ -n "$p" ]; then
              args="$args -i $p"
            fi
          done
          echo "args=$args" >> "$GITHUB_OUTPUT"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: ${{ steps.interpreters.outputs.args }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      # All three targets run natively here (windows-11-arm is a genuine
      # ARM64 runner, not emulated, and x86 runs at native speed under
      # WOW64), but only x64 is tested (in its own dedicated
      # test-windows-x64 job below): pyarrow (a sqlite-rs runtime dependency)
      # publishes no wheels for win32 or win_arm64 at all, and falls back to
      # a from-source scikit-build-core/CMake build that fails outright
      # without the full Arrow C++ toolchain (confirmed in CI).
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      # See the matching comment in the windows job: explicit -i list of
      # exact interpreter paths, not --find-interpreter, because installing
      # both a regular and free-threaded build of the same X.Y version (e.g.
      # "3.14"/"3.14t") made --find-interpreter only ever find the
      # free-threaded one, silently dropping plain "CPython 3.14"/"3.15"
      # from what got built (confirmed from build logs). update-environment:
      # false keeps every install below from touching PATH at all, so only
      # the explicit -i paths (each step's own python-path output) matter.
      - id: py310
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          update-environment: false
      - id: py311
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          update-environment: false
      - id: py312
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          update-environment: false
      - id: py313
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          update-environment: false
      - id: py314
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          update-environment: false
      - id: py315
        uses: actions/setup-python@v6
        with:
          python-version: "3.15"
          allow-prereleases: true
          update-environment: false
      - id: py314t
        uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
          update-environment: false
      - id: py315t
        uses: actions/setup-python@v6
        with:
          python-version: "3.15t"
          allow-prereleases: true
          update-environment: false
      - uses: astral-sh/setup-uv@v7
      - name: Compute interpreter list
        id: interpreters
        shell: bash
        run: |
          args="--release --out dist"
          for p in \
            "${{ steps.py310.outputs.python-path }}" \
            "${{ steps.py311.outputs.python-path }}" \
            "${{ steps.py312.outputs.python-path }}" \
            "${{ steps.py313.outputs.python-path }}" \
            "${{ steps.py314.outputs.python-path }}" \
            "${{ steps.py315.outputs.python-path }}" \
            "${{ steps.py314t.outputs.python-path }}" \
            "${{ steps.py315t.outputs.python-path }}"; do
            if [ -n "$p" ]; then
              args="$args -i $p"
            fi
          done
          echo "args=$args" >> "$GITHUB_OUTPUT"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: ${{ steps.interpreters.outputs.args }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      # Both targets run natively here (macos-15-intel is genuinely x86_64,
      # macos-latest is genuinely Apple Silicon), no QEMU concern. Tested in
      # their own dedicated test-macos-x86_64/test-macos-aarch64 jobs below
      # (one job per Python version actually built here), not inline here.
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  # One test job per native platform, each with its own Python-version
  # matrix instead of a single "3.x" -- installing/testing every wheel each
  # build job actually produced (confirmed per-platform from build logs, not
  # assumed), rather than only whichever interpreter that job's own
  # setup-python happened to resolve. Separate jobs (not extra steps in the
  # build jobs above) so a version's setup-python/install/test doesn't force
  # a matrix dimension onto the build step itself, which already builds
  # every version in one maturin invocation via --find-interpreter.
  #
  # 3.15/3.15t/pypy3.11 are built (see the linux job above) but deliberately
  # not tested here: pyarrow (a sqlite-rs runtime dependency, kept even
  # though nothing in the codebase uses it yet -- it's needed soon) has no
  # prebuilt wheel for any of the three, and fails building from source for
  # each (PyPy: missing Arrow C++ toolchain; 3.15/3.15t: a libcst build
  # dependency's own PyO3 version doesn't recognize either yet) -- confirmed
  # in CI, an upstream availability gap rather than anything sqlite-rs or
  # this workflow can fix.
  test-linux-x86_64:
    needs: linux
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: wheels-linux-x86_64
          path: dist
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - name: Install built wheel
        run: uv pip install --system --find-links dist sqlite-rs
      - name: Install test dependencies
        run: uv pip install --system --group test
      - name: Run tests
        run: pytest tests/

  # manylinux_2_28_aarch64's /opt/python has the same interpreter set as the
  # manylinux-cross images the linux job's other targets use (confirmed from
  # this job's own build log), so the same Python-version list applies --
  # see the matching comment on test-linux-x86_64 for why 3.15/3.15t/
  # pypy3.11 are built but not tested (pyarrow has no wheel and can't build
  # from source for any of the three).
  test-linux-aarch64:
    needs: linux-aarch64
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: wheels-linux-aarch64
          path: dist
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - name: Install built wheel
        run: uv pip install --system --find-links dist sqlite-rs
      - name: Install test dependencies
        run: uv pip install --system --group test
      - name: Run tests
        run: pytest tests/

  # macOS's build job builds 3.10-3.15 and the two free-threaded builds
  # (3.14t/3.15t), but 3.15/3.15t aren't tested here -- see the matching
  # comment on test-linux-x86_64: pyarrow has no wheel and can't build from
  # source for either.
  test-macos-x86_64:
    needs: macos
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: wheels-macos-x86_64
          path: dist
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - name: Install built wheel
        run: uv pip install --system --find-links dist sqlite-rs
      - name: Install test dependencies
        run: uv pip install --system --group test
      - name: Run tests
        run: pytest tests/

  test-macos-aarch64:
    needs: macos
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: wheels-macos-aarch64
          path: dist
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - name: Install built wheel
        run: uv pip install --system --find-links dist sqlite-rs
      - name: Install test dependencies
        run: uv pip install --system --group test
      - name: Run tests
        run: pytest tests/

  # Same story as macOS: windows's build job builds 3.10-3.15/3.14t/3.15t,
  # but 3.15/3.15t aren't tested here for the same pyarrow reason. 3.14t is
  # also excluded here specifically (still tested on linux/macos): the test
  # dependency group's pywin32 -- needed only on win32 -- has no free-
  # threaded wheel for any CPython version yet (confirmed in CI: "no wheels
  # ... with Python ABI tags: cp39, cp310, cp311, cp312, cp313, cp314,
  # cp315" -- no cp314t/cp315t).
  test-windows-x64:
    needs: windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: wheels-windows-x64
          path: dist
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - uses: astral-sh/setup-uv@v7
      - name: Install built wheel
        run: uv pip install --system --find-links dist sqlite-rs
      - name: Install test dependencies
        run: uv pip install --system --group test
      - name: Run tests
        run: pytest tests/

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [linux, linux-aarch64, musllinux, windows, macos, sdist]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@v7
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: 'wheels-*/*'
      - name: Install uv
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: uv publish 'wheels-*/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
